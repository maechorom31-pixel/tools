<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바로가기 모음</title>
<style>
  /* ── 디자인 토큰: 밝은 중립 배경 + 흰 카드 + 파랑 포인트 (고대비) ── */
  :root {
    --bg: #F4F5F7;
    --card: #FFFFFF;
    --ink: #171A20;
    --ink-soft: #5A616C;
    --line: #E3E5EA;
    --accent: #3355D8;
    --accent-strong: #2543B8;
    --accent-soft: #EBF0FF;
    --star: #F59F00;
    --danger: #D6336C;
    --shadow: 0 1px 2px rgba(23, 26, 32, .05), 0 4px 14px rgba(23, 26, 32, .06);
    --shadow-lift: 0 2px 6px rgba(23, 26, 32, .07), 0 12px 28px rgba(23, 26, 32, .11);
  }
  /* 카테고리 색상 (카드 아이콘 배경·섹션 점 색) — 순서대로 순환 */
  .tint-0 { --tb: #E8EEFF; --tf: #3B5BDB; } /* 파랑 */
  .tint-1 { --tb: #F3EBFF; --tf: #7048E8; } /* 보라 */
  .tint-2 { --tb: #DFF4F0; --tf: #099268; } /* 청록 */
  .tint-3 { --tb: #FFF0DC; --tf: #E8590C; } /* 주황 */
  .tint-4 { --tb: #FFE9F0; --tf: #D6336C; } /* 분홍 */
  .tint-5 { --tb: #EDEFF3; --tf: #4B5563; } /* 회색 */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #14161B;
      --card: #1D2027;
      --ink: #EAECF1;
      --ink-soft: #9BA2AE;
      --line: #2D313B;
      --accent: #8298FF;
      --accent-strong: #A5B4FF;
      --accent-soft: #242C4E;
      --star: #FFC94D;
      --danger: #FF8CB0;
      --shadow: 0 1px 3px rgba(0,0,0,.35), 0 4px 14px rgba(0,0,0,.28);
      --shadow-lift: 0 2px 6px rgba(0,0,0,.4), 0 12px 28px rgba(0,0,0,.35);
    }
    :root:not([data-theme="light"]) .tint-0 { --tb: #26305A; --tf: #91A7FF; }
    :root:not([data-theme="light"]) .tint-1 { --tb: #2F2455; --tf: #B197FC; }
    :root:not([data-theme="light"]) .tint-2 { --tb: #1B3A33; --tf: #63E6BE; }
    :root:not([data-theme="light"]) .tint-3 { --tb: #46301A; --tf: #FFA94D; }
    :root:not([data-theme="light"]) .tint-4 { --tb: #47222F; --tf: #FAA2C1; }
    :root:not([data-theme="light"]) .tint-5 { --tb: #2A2F3A; --tf: #ADB5BD; }
  }
  :root[data-theme="dark"] {
    --bg: #14161B;
    --card: #1D2027;
    --ink: #EAECF1;
    --ink-soft: #9BA2AE;
    --line: #2D313B;
    --accent: #8298FF;
    --accent-strong: #A5B4FF;
    --accent-soft: #242C4E;
    --star: #FFC94D;
    --danger: #FF8CB0;
    --shadow: 0 1px 3px rgba(0,0,0,.35), 0 4px 14px rgba(0,0,0,.28);
    --shadow-lift: 0 2px 6px rgba(0,0,0,.4), 0 12px 28px rgba(0,0,0,.35);
  }
  :root[data-theme="dark"] .tint-0 { --tb: #26305A; --tf: #91A7FF; }
  :root[data-theme="dark"] .tint-1 { --tb: #2F2455; --tf: #B197FC; }
  :root[data-theme="dark"] .tint-2 { --tb: #1B3A33; --tf: #63E6BE; }
  :root[data-theme="dark"] .tint-3 { --tb: #46301A; --tf: #FFA94D; }
  :root[data-theme="dark"] .tint-4 { --tb: #47222F; --tf: #FAA2C1; }
  :root[data-theme="dark"] .tint-5 { --tb: #2A2F3A; --tf: #ADB5BD; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { color-scheme: light dark; }
  body {
    font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 28px 16px 60px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 980px; margin: 0 auto; }

  header {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 12px; flex-wrap: wrap; margin-bottom: 18px;
  }
  .title-block h1 {
    font-size: 1.55rem; font-weight: 800; letter-spacing: -0.025em;
    display: flex; align-items: center; gap: 9px;
  }
  .title-block .subtitle {
    margin-top: 4px; font-size: .84rem; color: var(--ink-soft); letter-spacing: -0.01em;
  }
  .header-btns { display: flex; gap: 8px; align-items: center; }

  button {
    font-family: inherit; cursor: pointer; border: none;
    border-radius: 10px; font-size: .87rem; font-weight: 600;
    color: var(--ink);
  }
  :is(button, a, input, select):focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }
  .btn {
    padding: 9px 14px; background: var(--card); color: var(--ink);
    border: 1px solid var(--line); box-shadow: var(--shadow);
    transition: background .15s, border-color .15s;
  }
  .btn:hover { background: var(--accent-soft); border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
  .btn.editing { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.icon-btn { padding: 9px 11px; font-size: 1rem; line-height: 1; }
  :root[data-theme="dark"] .btn.primary, :root[data-theme="dark"] .btn.editing { color: #14161B; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .btn.primary,
    :root:not([data-theme="light"]) .btn.editing { color: #14161B; }
  }

  /* ── 검색 ── */
  .search-row { position: relative; margin-bottom: 14px; }
  .search-row input {
    width: 100%; padding: 13px 84px 13px 42px; font-size: .95rem; font-family: inherit;
    border: 1px solid var(--line); border-radius: 12px;
    background: var(--card); color: var(--ink);
    box-shadow: var(--shadow); outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .search-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .search-row input::-webkit-search-cancel-button { -webkit-appearance: none; appearance: none; }
  .search-row .search-ico {
    position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
    font-size: .9rem; color: var(--ink-soft); pointer-events: none;
  }
  .search-row kbd {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    font-family: inherit; font-size: .72rem; color: var(--ink-soft);
    border: 1px solid var(--line); border-bottom-width: 2px;
    border-radius: 5px; padding: 2px 7px; background: var(--bg);
    pointer-events: none;
  }
  .search-row .clear-btn {
    position: absolute; right: 44px; top: 50%; transform: translateY(-50%);
    display: none; width: 26px; height: 26px; border-radius: 7px;
    background: none; color: var(--ink-soft); font-size: .85rem; line-height: 1;
  }
  .search-row .clear-btn:hover { background: var(--accent-soft); color: var(--accent); }
  .search-row.has-query .clear-btn { display: block; }
  .search-meta {
    display: none; margin: -6px 4px 12px; font-size: .78rem; color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
  }
  .search-meta.show { display: block; }
  .search-meta b { color: var(--accent); font-weight: 700; }

  /* ── 탭: 선택된 탭은 진한 알약으로 확실하게 ── */
  .tabs {
    display: flex; gap: 8px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 10;
    padding: 10px 0 12px; margin-bottom: 10px;
    background: var(--bg);
  }
  .tab {
    padding: 9px 16px; border-radius: 999px;
    background: var(--card); color: var(--ink-soft);
    border: 1px solid var(--line); font-size: .88rem; font-weight: 600;
    transition: background .12s, color .12s;
  }
  .tab:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
  .tab.active { background: var(--ink); color: var(--bg); border-color: var(--ink); font-weight: 700; }
  .tab.active:hover { color: var(--bg); }
  .tab .count { opacity: .65; font-weight: 500; margin-left: 4px; font-size: .8rem; font-variant-numeric: tabular-nums; }
  .tab.add-cat { border-style: dashed; }

  /* ── 섹션 제목: 카테고리 색 점 + 개수 + 가는 선 ── */
  .section-title {
    font-size: .86rem; font-weight: 700; color: var(--ink);
    letter-spacing: -0.01em;
    margin: 26px 2px 10px; display: flex; align-items: center; gap: 8px;
  }
  .section-title .dot {
    width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto;
    background: var(--tf, var(--ink-soft));
  }
  .section-title .n { color: var(--ink-soft); font-weight: 600; font-size: .8rem; font-variant-numeric: tabular-nums; }
  .section-title::after {
    content: ""; flex: 1; height: 1px; background: var(--line);
  }
  .section-title .cat-actions { display: none; gap: 6px; }
  body.edit-mode .section-title .cat-actions { display: inline-flex; }
  .cat-actions button {
    background: none; border: none; font-size: .76rem; color: var(--ink-soft);
    padding: 4px 8px; border-radius: 6px;
  }
  .cat-actions button:hover { background: var(--accent-soft); color: var(--accent); }
  .cat-actions button.del:hover { color: var(--danger); }

  /* ── 카드 ── */
  .grid {
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(272px, 1fr));
  }
  .card {
    position: relative; display: flex; gap: 13px; align-items: flex-start;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 16px 16px 14px;
    text-decoration: none; color: var(--ink);
    box-shadow: var(--shadow);
    transition: transform .14s, border-color .14s, box-shadow .14s;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: var(--shadow-lift); }
  .card .icon {
    flex: 0 0 auto; width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.35rem; border-radius: 12px;
    background: var(--tb, var(--accent-soft));
  }
  .card .body { min-width: 0; flex: 1; }
  .card .name {
    font-weight: 700; font-size: 1rem; margin-bottom: 3px;
    padding-right: 34px; letter-spacing: -0.015em; line-height: 1.35;
  }
  .card .desc { font-size: .84rem; color: var(--ink-soft); margin-bottom: 7px; min-height: 1.1em; line-height: 1.55; }
  .card .url {
    font-size: .73rem; color: var(--ink-soft); opacity: .8;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block;
    font-variant-numeric: tabular-nums;
  }
  .card:hover .url { color: var(--accent); opacity: 1; }
  .card mark {
    background: var(--accent-soft); color: var(--accent-strong);
    border-radius: 3px; padding: 0 1px;
  }
  .card .star-btn {
    position: absolute; top: 8px; right: 8px;
    background: none; font-size: 1.2rem; line-height: 1;
    width: 38px; height: 38px; border-radius: 9px; color: var(--line);
    transition: transform .12s;
  }
  .card .star-btn:hover { background: var(--accent-soft); color: var(--star); transform: scale(1.08); }
  .card .star-btn.on { color: var(--star); }
  .card .edit-btns {
    position: absolute; top: 8px; right: 46px;
    display: none; gap: 0;
  }
  body.edit-mode .card .edit-btns { display: flex; }
  body.edit-mode .card .name { padding-right: 170px; }
  .card .edit-btns button {
    background: none; font-size: .95rem; width: 34px; height: 38px; border-radius: 9px;
    color: var(--ink-soft);
  }
  .card .edit-btns button:hover { background: var(--accent-soft); color: var(--accent); }
  .card .edit-btns button.del:hover { color: var(--danger); }
  .card .edit-btns button:disabled { opacity: .3; cursor: default; }

  .empty {
    text-align: center; color: var(--ink-soft); padding: 52px 0; font-size: .92rem; line-height: 1.9;
  }
  .empty .big { font-size: 1.6rem; display: block; margin-bottom: 4px; }

  /* ── 모달 ── */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(15, 18, 28, .55); z-index: 50;
    align-items: center; justify-content: center; padding: 16px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--card); border-radius: 16px; padding: 24px;
    width: 100%; max-width: 420px; box-shadow: 0 10px 40px rgba(0,0,0,.3);
    max-height: 90vh; overflow-y: auto;
    border: 1px solid var(--line);
  }
  .modal h2 { font-size: 1.1rem; margin-bottom: 16px; letter-spacing: -0.01em; }
  .modal label { display: block; font-size: .8rem; font-weight: 600; color: var(--ink-soft); margin: 12px 0 5px; }
  .modal input, .modal select {
    width: 100%; padding: 10px 12px; font-size: .9rem; font-family: inherit;
    border: 1px solid var(--line); border-radius: 10px;
    background: var(--bg); color: var(--ink); outline: none;
    transition: border-color .12s;
  }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal .row2 { display: flex; gap: 10px; }
  .modal .row2 > div:first-child { flex: 0 0 90px; }
  .modal .row2 > div:last-child { flex: 1; }
  .modal .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* ── 푸터 ── */
  footer {
    margin-top: 44px; text-align: center; font-size: .78rem; color: var(--ink-soft); line-height: 1.9;
  }
  footer .foot-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-top: 6px; }
  footer button {
    background: none; color: var(--ink-soft); text-decoration: underline;
    text-underline-offset: 3px; font-size: .78rem; font-weight: 500; padding: 2px 4px;
  }
  footer button:hover { color: var(--accent); }
  footer button.danger:hover { color: var(--danger); }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
    .card:hover { transform: none; }
    .card .star-btn:hover { transform: none; }
  }
  @media (max-width: 480px) {
    body { padding: 20px 12px 48px; }
    .grid { grid-template-columns: 1fr; }
    .search-row kbd { display: none; }
    .search-row .clear-btn { right: 12px; }
    .search-row input { padding-right: 46px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title-block">
      <h1><span aria-hidden="true">🔖</span>바로가기 모음</h1>
      <p class="subtitle">자주 쓰는 도구와 사이트를 한곳에서</p>
    </div>
    <div class="header-btns">
      <button class="btn icon-btn" id="themeBtn" title="테마 전환 (자동 → 라이트 → 다크)" aria-label="테마 전환">🌗</button>
      <button class="btn primary" id="addLinkBtn">＋ 링크 추가</button>
      <button class="btn" id="editModeBtn">✏️ 편집</button>
    </div>
  </header>

  <div class="search-row" id="searchRow">
    <span class="search-ico" aria-hidden="true">🔍</span>
    <input type="search" id="searchInput" placeholder="이름, 주소, 설명으로 검색…" aria-label="링크 검색">
    <button class="clear-btn" id="searchClearBtn" title="검색어 지우기" aria-label="검색어 지우기">✕</button>
    <kbd>/</kbd>
  </div>
  <p class="search-meta" id="searchMeta" aria-live="polite"></p>

  <nav class="tabs" id="tabs" aria-label="카테고리"></nav>

  <main id="content"></main>

  <footer>
    카드의 ☆를 누르면 즐겨찾기에 모아볼 수 있습니다 · 변경 사항은 이 브라우저에 자동 저장됩니다
    <div class="foot-btns">
      <button id="exportBtn">목록 내보내기 (백업)</button>
      <button id="importBtn">목록 가져오기</button>
      <button id="resetBtn" class="danger">기본값으로 초기화</button>
    </div>
    <input type="file" id="importFile" accept=".json,application/json" hidden>
  </footer>
</div>

<!-- 링크 추가/수정 모달 -->
<div class="modal-bg" id="linkModal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="linkModalTitle">
    <h2 id="linkModalTitle">링크 추가</h2>
    <div class="row2">
      <div>
        <label for="fIcon">아이콘</label>
        <input type="text" id="fIcon" placeholder="🔗" maxlength="4">
      </div>
      <div>
        <label for="fName">이름</label>
        <input type="text" id="fName" placeholder="예: 등급 시뮬레이터">
      </div>
    </div>
    <label for="fUrl">주소 (URL)</label>
    <input type="url" id="fUrl" placeholder="https://…">
    <label for="fDesc">설명 (선택)</label>
    <input type="text" id="fDesc" placeholder="간단한 설명">
    <label for="fCat">카테고리</label>
    <select id="fCat"></select>
    <div class="modal-btns">
      <button class="btn" id="linkCancelBtn">취소</button>
      <button class="btn primary" id="linkSaveBtn">저장</button>
    </div>
  </div>
</div>

<script>
/* ================================================================
   기본 데이터 — 여기를 직접 수정해도 됩니다.
   (브라우저에서 편집한 내용은 localStorage에 따로 저장되며,
    "기본값으로 초기화"를 누르면 아래 목록으로 되돌아갑니다)
   ================================================================ */

    { icon: "🎓", name: "수시입결검색기",              url: "https://maechorom31-pixel.github.io/univ",                      desc: "대입 수시 입시결과 검색 (2022~2026학년도)",            cat: "대입", fav: false },
    { icon: "📈", name: "수시 입결 검색기 (어디가)",    url: "https://doctor-noh.vercel.app/",                                desc: "'어디가' 기반 수시 입시결과 조회 — 교차 검증용",       cat: "대입", fav: false },
    { icon: "🏛️", name: "전문대 진학 탐색",            url: "https://maechorom31-pixel.github.io/College/",                  desc: "전국 전문대학 지도·조건 탐색, 입결·취업률 비교 (2027 입시)", cat: "대입", fav: false },
    { icon: "🧭", name: "진학정보실",                  url: "https://jinhak.esteacher.kr/index.html",                        desc: "EST 교사용 진학 지원 자료실 — 입시결과·전형·모집요강·통계", cat: "대입", fav: false },
    { icon: "🔎", name: "대학 개설학과·모집인원 검색",   url: "https://jinhak.esteacher.kr/2027uni.html",                      desc: "2027 대학별 개설학과·모집인원·계열 검색 (진로진학 상담 도구)", cat: "대입", fav: false },
    { icon: "💡", name: "탐구 키워드 펼쳐보기",         url: "https://maechorom31-pixel.github.io/keyword-explorer/",         desc: "탐구 주제·키워드 색인을 펼쳐서 탐색",                  cat: "대입", fav: false },
    { icon: "📖", name: "문학 자율학습",               url: "https://maechorom31-pixel.github.io/literary-Texts/",           desc: "수능특강 문학 — 작품 급소(크럭스)·O/X 선지 판단 학습", cat: "국어", fav: false },
    { icon: "📚", name: "독서 자율학습",               url: "https://maechorom31-pixel.github.io/Non-literary-Texts/",       desc: "수능특강 독서 — 도식 기반 능동 회상·분산 반복 학습",   cat: "국어", fav: false },
    { icon: "🖼️", name: "이미지 도구",                url: "https://maechorom31-pixel.github.io/tools/image/",              desc: "모자이크·자르기(증명/여권)·AI 배경 지우기·크기 조절·용량 압축 — 브라우저 안에서만 처리", cat: "도구", fav: false },
    { icon: "📄", name: "공문서 도우미",              url: "https://maechorom31-pixel.github.io/tools/gongmun/",            desc: "기안문 편람 규칙 즉시 검사(키 불필요)·AI 초안·교정·가정통신문 — 2025 행정업무운영편람 기준", cat: "도구", fav: false },
    { icon: "🏫", name: "전남교육포털",                url: "https://jne.eduptl.kr/",   desc: "전라남도교육청 통합 교육포털",             cat: "일반 주소", fav: false },
    { icon: "🧑‍🏫", name: "전남교육연수포털",          url: "https://www.jnstudy.kr/", desc: "전남 연수원 — 교원 연수 신청·이수 관리",   cat: "일반 주소", fav: false },
    { icon: "🤖", name: "AI 맞춤형 교수학습",          url: "https://ai.jne.kr/",      desc: "전남교육청 AI 맞춤형 교수학습 플랫폼",     cat: "일반 주소", fav: false }
  ]
};

const STORE_KEY = "linkhub-data-v3";
const THEME_KEY = "linkhub-theme";
let data = loadData();
let editMode = false;
let editingIndex = null; // null = 새 링크
// 첫 화면: 즐겨찾기가 있으면 즐겨찾기 탭, 없으면 전체 탭
let currentTab = data.links.some(l => l.fav) ? "즐겨찾기" : "전체";

function loadData() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.links) && Array.isArray(parsed.categories)) return parsed;
    }
  } catch (e) { /* 무시하고 기본값 사용 */ }
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
function saveData() {
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
}

/* ---------- 테마 (자동 → 라이트 → 다크 순환) ---------- */
const THEME_ORDER = ["auto", "light", "dark"];
const THEME_LABEL = { auto: "🌗", light: "☀️", dark: "🌙" };
const THEME_NAME  = { auto: "자동", light: "라이트", dark: "다크" };
function applyTheme(mode) {
  if (mode === "auto") document.documentElement.removeAttribute("data-theme");
  else document.documentElement.setAttribute("data-theme", mode);
  const btn = document.getElementById("themeBtn");
  btn.textContent = THEME_LABEL[mode];
  btn.title = "테마: " + THEME_NAME[mode] + " (누르면 전환)";
}
let theme = localStorage.getItem(THEME_KEY);
if (!THEME_ORDER.includes(theme)) theme = "auto";
applyTheme(theme);
document.getElementById("themeBtn").onclick = () => {
  theme = THEME_ORDER[(THEME_ORDER.indexOf(theme) + 1) % THEME_ORDER.length];
  localStorage.setItem(THEME_KEY, theme);
  applyTheme(theme);
};

/* ---------- 카테고리 색상 (순서대로 6색 순환) ---------- */
function tintClass(cat) {
  const i = data.categories.indexOf(cat);
  return i === -1 ? "" : "tint-" + (i % 6);
}

/* ---------- 렌더링 ---------- */
function render() {
  renderTabs();
  renderContent();
}

function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";
  const favCount = data.links.filter(l => l.fav).length;
  const defs = [
    { key: "즐겨찾기", label: "⭐ 즐겨찾기", count: favCount },
    { key: "전체",     label: "전체",       count: data.links.length },
    ...data.categories.map(c => ({ key: c, label: c, count: data.links.filter(l => l.cat === c).length }))
  ];
  defs.forEach(d => {
    const b = document.createElement("button");
    b.className = "tab" + (currentTab === d.key ? " active" : "");
    b.innerHTML = escapeHtml(d.label) + '<span class="count">' + d.count + "</span>";
    b.onclick = () => { currentTab = d.key; render(); };
    tabs.appendChild(b);
  });
  if (editMode) {
    const add = document.createElement("button");
    add.className = "tab add-cat";
    add.textContent = "＋ 카테고리";
    add.onclick = addCategory;
    tabs.appendChild(add);
  }
}

function renderContent() {
  const content = document.getElementById("content");
  content.innerHTML = "";
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  document.getElementById("searchRow").classList.toggle("has-query", q.length > 0);

  const matches = l =>
    !q || (l.name + " " + l.url + " " + (l.desc || "")).toLowerCase().includes(q);

  let groups; // [{title, links(원본 인덱스 포함)}]
  const withIdx = data.links.map((l, i) => ({ ...l, _i: i }));

  if (currentTab === "즐겨찾기") {
    groups = [{ title: null, links: withIdx.filter(l => l.fav && matches(l)) }];
  } else if (currentTab === "전체") {
    groups = data.categories.map(c => ({
      title: c,
      links: withIdx.filter(l => l.cat === c && matches(l))
    }));
    const orphans = withIdx.filter(l => !data.categories.includes(l.cat) && matches(l));
    if (orphans.length) groups.push({ title: "기타", links: orphans });
  } else {
    groups = [{ title: editMode ? currentTab : null, links: withIdx.filter(l => l.cat === currentTab && matches(l)) }];
  }

  // 검색 결과 개수 표시
  const meta = document.getElementById("searchMeta");
  if (q) {
    const total = groups.reduce((n, g) => n + g.links.length, 0);
    meta.innerHTML = '"' + escapeHtml(q) + '" 검색 결과 <b>' + total + "</b>개";
    meta.classList.add("show");
  } else {
    meta.classList.remove("show");
  }

  let any = false;
  groups.forEach(g => {
    if (!g.links.length && !(editMode && g.title && data.categories.includes(g.title))) return;
    any = any || g.links.length > 0;

    if (g.title) {
      const h = document.createElement("div");
      h.className = "section-title";
      const dot = document.createElement("span");
      dot.className = ("dot " + tintClass(g.title)).trim();
      dot.setAttribute("aria-hidden", "true");
      h.appendChild(dot);
      h.appendChild(document.createTextNode(g.title));
      const n = document.createElement("span");
      n.className = "n";
      n.textContent = g.links.length;
      h.appendChild(n);
      if (data.categories.includes(g.title)) {
        const acts = document.createElement("span");
        acts.className = "cat-actions";
        const ren = document.createElement("button");
        ren.textContent = "이름변경";
        ren.onclick = () => renameCategory(g.title);
        const del = document.createElement("button");
        del.textContent = "삭제";
        del.className = "del";
        del.onclick = () => deleteCategory(g.title);
        acts.appendChild(ren); acts.appendChild(del);
        h.appendChild(acts);
      }
      content.appendChild(h);
    }

    const grid = document.createElement("div");
    grid.className = "grid";
    g.links.forEach((l, pos) => grid.appendChild(makeCard(l, g.links, pos, q)));
    if (g.links.length) content.appendChild(grid);
  });

  if (!any) {
    const e = document.createElement("div");
    e.className = "empty";
    if (currentTab === "즐겨찾기" && !q) {
      e.innerHTML = '<span class="big" aria-hidden="true">⭐</span>카드의 ☆ 버튼을 눌러 즐겨찾기에 추가해 보세요.';
    } else {
      e.innerHTML = '<span class="big" aria-hidden="true">🔍</span>표시할 링크가 없습니다.';
    }
    content.appendChild(e);
  }
}

// 검색어와 일치하는 부분을 <mark>로 강조
function highlightInto(el, text, q) {
  if (!q) { el.textContent = text; return; }
  const lower = text.toLowerCase();
  let from = 0, idx;
  while ((idx = lower.indexOf(q, from)) !== -1) {
    if (idx > from) el.appendChild(document.createTextNode(text.slice(from, idx)));
    const m = document.createElement("mark");
    m.textContent = text.slice(idx, idx + q.length);
    el.appendChild(m);
    from = idx + q.length;
  }
  if (from < text.length) el.appendChild(document.createTextNode(text.slice(from)));
}

function makeCard(l, groupLinks, pos, q) {
  const a = document.createElement("a");
  a.className = "card";
  a.href = l.url;
  a.target = "_blank";
  a.rel = "noopener";

  const icon = document.createElement("div");
  icon.className = ("icon " + tintClass(l.cat)).trim();
  icon.textContent = l.icon || "🔗";
  icon.setAttribute("aria-hidden", "true");

  const body = document.createElement("div");
  body.className = "body";

  const name = document.createElement("div");
  name.className = "name";
  highlightInto(name, l.name, q);

  const desc = document.createElement("div");
  desc.className = "desc";
  highlightInto(desc, l.desc || "", q);

  const url = document.createElement("span");
  url.className = "url";
  url.textContent = l.url.replace(/^https?:\/\//, "");

  body.appendChild(name);
  body.appendChild(desc);
  body.appendChild(url);

  const star = document.createElement("button");
  star.className = "star-btn" + (l.fav ? " on" : "");
  star.textContent = l.fav ? "★" : "☆";
  star.title = "즐겨찾기";
  star.setAttribute("aria-label", (l.fav ? "즐겨찾기 해제: " : "즐겨찾기 추가: ") + l.name);
  star.onclick = e => {
    e.preventDefault(); e.stopPropagation();
    data.links[l._i].fav = !data.links[l._i].fav;
    saveData(); render();
  };

  const editBtns = document.createElement("span");
  editBtns.className = "edit-btns";

  // 순서 이동 (같은 화면 그룹 내에서 원본 배열의 위치를 교환)
  const up = document.createElement("button");
  up.textContent = "▲"; up.title = "위로";
  up.disabled = pos === 0;
  up.onclick = e => {
    e.preventDefault(); e.stopPropagation();
    swapLinks(l._i, groupLinks[pos - 1]._i);
  };
  const down = document.createElement("button");
  down.textContent = "▼"; down.title = "아래로";
  down.disabled = pos === groupLinks.length - 1;
  down.onclick = e => {
    e.preventDefault(); e.stopPropagation();
    swapLinks(l._i, groupLinks[pos + 1]._i);
  };

  const eb = document.createElement("button");
  eb.textContent = "✏️"; eb.title = "수정";
  eb.setAttribute("aria-label", "수정: " + l.name);
  eb.onclick = e => { e.preventDefault(); e.stopPropagation(); openLinkModal(l._i); };
  const db = document.createElement("button");
  db.textContent = "🗑"; db.title = "삭제"; db.className = "del";
  db.setAttribute("aria-label", "삭제: " + l.name);
  db.onclick = e => {
    e.preventDefault(); e.stopPropagation();
    if (confirm('"' + l.name + '" 링크를 삭제할까요?')) {
      data.links.splice(l._i, 1);
      saveData(); render();
    }
  };
  editBtns.appendChild(up); editBtns.appendChild(down);
  editBtns.appendChild(eb); editBtns.appendChild(db);

  a.appendChild(icon);
  a.appendChild(body);
  a.appendChild(editBtns);
  a.appendChild(star);
  return a;
}

function swapLinks(i, j) {
  [data.links[i], data.links[j]] = [data.links[j], data.links[i]];
  saveData(); render();
}

/* ---------- 링크 추가/수정 ---------- */
function openLinkModal(idx) {
  editingIndex = idx;
  const isEdit = idx !== null;
  document.getElementById("linkModalTitle").textContent = isEdit ? "링크 수정" : "링크 추가";
  const sel = document.getElementById("fCat");
  sel.innerHTML = "";
  data.categories.forEach(c => {
    const o = document.createElement("option");
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
  if (isEdit) {
    const l = data.links[idx];
    document.getElementById("fIcon").value = l.icon || "";
    document.getElementById("fName").value = l.name;
    document.getElementById("fUrl").value = l.url;
    document.getElementById("fDesc").value = l.desc || "";
    sel.value = data.categories.includes(l.cat) ? l.cat : data.categories[0];
  } else {
    document.getElementById("fIcon").value = "";
    document.getElementById("fName").value = "";
    document.getElementById("fUrl").value = "";
    document.getElementById("fDesc").value = "";
    if (data.categories.includes(currentTab)) sel.value = currentTab;
  }
  document.getElementById("linkModal").classList.add("open");
  document.getElementById("fName").focus();
}

function saveLink() {
  const icon = document.getElementById("fIcon").value.trim();
  const name = document.getElementById("fName").value.trim();
  let url = document.getElementById("fUrl").value.trim();
  const desc = document.getElementById("fDesc").value.trim();
  const cat = document.getElementById("fCat").value;
  if (!name || !url) { alert("이름과 주소를 입력해 주세요."); return; }
  if (!/^https?:\/\//i.test(url)) url = "https://" + url;

  if (editingIndex !== null) {
    Object.assign(data.links[editingIndex], { icon, name, url, desc, cat });
  } else {
    data.links.push({ icon, name, url, desc, cat, fav: false });
  }
  saveData();
  document.getElementById("linkModal").classList.remove("open");
  render();
}

/* ---------- 카테고리 관리 ---------- */
function addCategory() {
  const name = prompt("새 카테고리 이름을 입력하세요.\n(예: 툴, 일반 주소, 업무, 참고자료 …)");
  if (!name) return;
  const trimmed = name.trim();
  if (!trimmed) return;
  if (data.categories.includes(trimmed)) { alert("이미 있는 카테고리입니다."); return; }
  data.categories.push(trimmed);
  saveData();
  currentTab = trimmed;
  render();
}

function renameCategory(oldName) {
  const name = prompt("카테고리 이름 변경:", oldName);
  if (!name) return;
  const trimmed = name.trim();
  if (!trimmed || trimmed === oldName) return;
  if (data.categories.includes(trimmed)) { alert("이미 있는 카테고리입니다."); return; }
  data.categories = data.categories.map(c => c === oldName ? trimmed : c);
  data.links.forEach(l => { if (l.cat === oldName) l.cat = trimmed; });
  if (currentTab === oldName) currentTab = trimmed;
  saveData(); render();
}

function deleteCategory(name) {
  const count = data.links.filter(l => l.cat === name).length;
  if (!confirm('"' + name + '" 카테고리를 삭제할까요?' + (count ? "\n(포함된 링크 " + count + "개도 함께 삭제됩니다)" : ""))) return;
  data.categories = data.categories.filter(c => c !== name);
  data.links = data.links.filter(l => l.cat !== name);
  if (currentTab === name) currentTab = "전체";
  saveData(); render();
}

/* ---------- 백업 내보내기 / 가져오기 ---------- */
function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  const pad = n => String(n).padStart(2, "0");
  a.download = "바로가기모음-백업-" + d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()) + ".json";
  a.click();
  URL.revokeObjectURL(a.href);
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (!parsed || !Array.isArray(parsed.links) || !Array.isArray(parsed.categories)) {
        alert("올바른 백업 파일이 아닙니다.\n(내보내기로 만든 JSON 파일을 선택해 주세요)");
        return;
      }
      if (!confirm("현재 목록을 백업 파일의 내용(" + parsed.links.length + "개 링크)으로 교체할까요?")) return;
      data = parsed;
      saveData();
      currentTab = data.links.some(l => l.fav) ? "즐겨찾기" : "전체";
      render();
    } catch (e) {
      alert("파일을 읽을 수 없습니다. JSON 형식인지 확인해 주세요.");
    }
  };
  reader.readAsText(file);
}

/* ---------- 유틸 & 이벤트 ---------- */
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
}

document.getElementById("addLinkBtn").onclick = () => openLinkModal(null);
document.getElementById("editModeBtn").onclick = function () {
  editMode = !editMode;
  document.body.classList.toggle("edit-mode", editMode);
  this.classList.toggle("editing", editMode);
  this.textContent = editMode ? "✔️ 편집 완료" : "✏️ 편집";
  render();
};
document.getElementById("linkSaveBtn").onclick = saveLink;
document.getElementById("linkCancelBtn").onclick = () => document.getElementById("linkModal").classList.remove("open");
document.getElementById("linkModal").onclick = e => {
  if (e.target === document.getElementById("linkModal")) e.target.classList.remove("open");
};
document.getElementById("searchInput").oninput = renderContent;
document.getElementById("searchClearBtn").onclick = () => {
  const inp = document.getElementById("searchInput");
  inp.value = "";
  renderContent();
  inp.focus();
};
document.getElementById("exportBtn").onclick = exportData;
document.getElementById("importBtn").onclick = () => document.getElementById("importFile").click();
document.getElementById("importFile").onchange = function () {
  if (this.files && this.files[0]) importData(this.files[0]);
  this.value = ""; // 같은 파일을 다시 선택해도 동작하도록
};
document.getElementById("resetBtn").onclick = () => {
  if (confirm("모든 변경 사항을 지우고 기본 목록으로 되돌릴까요?")) {
    localStorage.removeItem(STORE_KEY);
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    currentTab = data.links.some(l => l.fav) ? "즐겨찾기" : "전체";
    render();
  }
};
document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    const modal = document.getElementById("linkModal");
    if (modal.classList.contains("open")) { modal.classList.remove("open"); return; }
    const inp = document.getElementById("searchInput");
    if (document.activeElement === inp && inp.value) { inp.value = ""; renderContent(); }
  }
  // "/" 키로 검색창 바로 이동 (입력 중이 아닐 때)
  if (e.key === "/" && !/^(INPUT|SELECT|TEXTAREA)$/.test(document.activeElement.tagName)) {
    e.preventDefault();
    document.getElementById("searchInput").focus();
  }
});

render();
</script>
